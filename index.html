<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pollería Online</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <h1>🍗 Pollería Online</h1>

    <p>
      Haz tu pedido rápido y fácil
    </p>

  </header>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- MENÚ -->
    <div class="menu" id="menu"></div>

    <!-- CARRITO -->
    <div class="carrito">

      <h2>🛒 Pedido</h2>

      <div id="carrito"></div>

      <h3 class="total">
        Total: $
        <span id="total">0</span>
      </h3>

      <hr>

      <!-- UBICACIÓN -->
      <h3>📍 Ubicación</h3>

      <button class="btn-ubicacion" onclick="usarUbicacion()">
        📍 Usar mi ubicación actual
      </button>

      <button class="btn-mapa" onclick="verUbicacion()">
        🗺️ Ver ubicación seleccionada
      </button>

      <p id="estado"></p>

      <!-- WHATSAPP -->
      <input
        type="text"
        id="whatsapp"
        placeholder="Tu número de WhatsApp">

      <!-- ENVIAR -->
      <button class="btn-final" onclick="enviarPedido()">
        Confirmar pedido 🍗📲
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
