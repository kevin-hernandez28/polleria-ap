<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Pollería Eli</title>

  <link
  rel="stylesheet"
  href="styles.css">

</head>

<body>

  <!-- HEADER -->

  <header class="header">

    <h1>🍗 Pollería Eli</h1>

    <p>
      Haz tu pedido rápido y fácil
    </p>

  </header>

  <!-- CONTENIDO -->

  <div class="container">

    <!-- MENU -->

    <div
    class="menu"
    id="menu"></div>

    <!-- CARRITO PREMIUM -->

    <div class="carrito">

      <!-- HEADER PEDIDO -->

      <div class="pedido-header">

        <h2>🛒 Tu pedido</h2>

        <p>
          Revisa tus productos antes de enviar
        </p>

      </div>

      <!-- PRODUCTOS -->

      <div id="carrito"></div>

      <!-- TOTAL -->

      <div class="total-box">

        <span>Total</span>

        <h3>

          <span class="peso">$</span>

          <span id="total">0</span>

        </h3>

      </div>

      <!-- UBICACION -->

      <div class="ubicacion-box">

        <h3>📍 Dirección de entrega</h3>

        <p>
          Usa tu ubicación actual para registrar tu domicilio
        </p>

        <button
        class="btn-ubicacion"
        onclick="usarUbicacion()">

          📍 Usar mi ubicación actual

        </button>

        <button
        class="btn-mapa"
        onclick="verUbicacion()">

          🗺️ Ver ubicación seleccionada

        </button>

        <div id="estado"></div>

      </div>

      <!-- WHATSAPP -->

      <div class="input-container">

        <label>

          📱 Número de WhatsApp

        </label>

        <input
        type="text"
        id="whatsapp"
        placeholder="Ejemplo: 2282719114">

      </div>

      <!-- BOTON ENVIAR -->

      <button
      class="btn-final"
      onclick="enviarPedido()">

        🍗 Enviar pedido por WhatsApp

      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
