<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Pollería Eli</title>

  <link
  rel="stylesheet"
  href="styles.css">

  <!-- ICONOS -->
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

  <!-- HERO -->

  <header class="hero">

    <div class="hero-content">

      <h1>🍗 POLLERÍA ELI</h1>

      <p>
        El mejor pollo fresco hasta tu casa
      </p>

    </div>

  </header>

  <!-- APP -->

  <main class="app">

    <!-- MENÚ -->

    <section class="menu-section">

      <div class="title-row">

        <h2>🔥 Nuestro menú</h2>

      </div>

      <div
      class="menu-grid"
      id="menu"></div>

    </section>

    <!-- CARRITO -->

    <aside class="cart">

      <div class="cart-header">

        <h2>🛒 Tu pedido</h2>

      </div>

      <div id="carrito"></div>

      <div class="total-box">

        TOTAL:

        <span>
          $<span id="total">0</span>
        </span>

      </div>

      <!-- UBICACIÓN -->

      <div class="gps-box">

        <h3>📍 Tu ubicación</h3>

        <button
        class="btn-location"
        onclick="usarUbicacion()">

          <i class="fa-solid fa-location-dot"></i>

          Usar mi ubicación actual

        </button>

        <button
        class="btn-map"
        onclick="verUbicacion()">

          <i class="fa-solid fa-map-location-dot"></i>

          Ver ubicación seleccionada

        </button>

        <p id="estado"></p>

      </div>

      <!-- WHATSAPP -->

      <div class="input-box">

        <label>

          📱 WhatsApp del cliente

        </label>

        <input
        type="text"
        id="whatsapp"
        placeholder="Ejemplo: 2282719114">

      </div>

      <!-- BOTÓN -->

      <button
      class="btn-send"
      onclick="enviarPedido()">

        <i class="fa-brands fa-whatsapp"></i>

        Enviar pedido

      </button>

    </aside>

  </main>

  <script src="app.js"></script>

</body>

</html>
